<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>🐾 企業萌帳本 | 輕鬆掌握公司財務</title>

  <link rel="icon" type="image/png" href="./icon.png?v=2">
  <link rel="apple-touch-icon" href="./icon.png?v=2">
  <link rel="apple-touch-icon" sizes="180x180" href="./icon.png?v=2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="企業萌帳本">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>function gisLoaded() { if(window.initGis) window.initGis(); }</script>
  <script src="https://accounts.google.com/gsi/client" async defer onload="gisLoaded()"></script>
</head>

<body>
  <header class="app-header">
    <div class="container header-flex">
      <h1 class="logo"><i class="fa-solid fa-briefcase"></i> 企業萌帳本</h1>
      <div class="auth-area">
        <span id="statusText" class="status-msg">等待魔法連線...</span>
        <button id="btnSignIn" class="btn btn-primary"><i class="fa-brands fa-google"></i> 登入</button>
        <button id="btnSignOut" class="btn btn-outline hidden"><i class="fa-solid fa-sign-out-alt"></i> 登出</button>
      </div>
    </div>
  </header>

  <main class="container main-layout">
    <section class="card form-section">
      <h2 class="card-title"><i class="fa-solid fa-seedling"></i> 記下一筆新帳務</h2>
      <form id="recordForm" class="cute-form">
        <div class="input-row">
          <div class="input-group">
            <label>📅 收支日期</label>
            <input type="date" id="fDate" required />
          </div>
          <div class="input-group">
            <label>🏷️ 類型</label>
            <select id="fType" required>
              <option value="支出">💸 支出</option>
              <option value="收入">💰 收入</option>
            </select>
          </div>
        </div>
        
        <div class="input-group">
          <label>🏢 公司 / 帳戶</label>
          <input type="text" id="fAccount" list="accountList" placeholder="請選擇或輸入帳戶" required autocomplete="off" />
          <datalist id="accountList"></datalist>
        </div>

        <div class="input-row">
          <div class="input-group">
            <label>📂 分類</label>
            <input type="text" id="fCategory" list="categoryList" placeholder="請選擇或輸入分類" required autocomplete="off" />
            <datalist id="categoryList"></datalist>
          </div>
          <div class="input-group">
            <label>📋 細項</label>
            <input type="text" id="fSubItem" list="subItemList" placeholder="請選擇或輸入細項" required autocomplete="off" />
            <datalist id="subItemList"></datalist>
          </div>
        </div>

        <div class="input-group">
          <label>🪙 金額</label>
          <input type="number" id="fAmount" min="0" step="1" placeholder="輸入金額..." required />
        </div>

        <div class="input-group">
          <label>📝 備註說明</label>
          <input type="text" id="fNote" placeholder="例如：3月稅金預存" />
        </div>

        <button type="submit" id="btnSubmit" class="btn btn-submit" disabled>
          <i class="fa-solid fa-paper-plane"></i> 送出進帳本
        </button>
      </form>
    </section>

    <section class="dashboard-section">
      <div class="card filter-card">
        <h2 class="card-title"><i class="fa-solid fa-magnifying-glass-chart"></i> 一鍵財務分析</h2>
        <div class="filter-controls">
          <select id="filterAccount"><option value="ALL">🏢 全部帳戶</option></select>
          <select id="filterCategory"><option value="ALL">📂 全部分類</option></select>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card box-income">
          <div class="stat-title">篩選總收入</div>
          <div class="stat-value" id="dispIncome">0</div>
        </div>
        <div class="stat-card box-expense">
          <div class="stat-title">篩選總支出</div>
          <div class="stat-value" id="dispExpense">0</div>
        </div>
        <div class="stat-card box-balance">
          <div class="stat-title">該帳戶當前餘額</div>
          <div class="stat-value" id="dispBalance">-</div>
        </div>
      </div>

      <div class="card chart-card">
        <h3 class="chart-title"><i class="fa-solid fa-chart-line"></i> 近六個月趨勢圖</h3>
        <div class="chart-wrapper">
          <canvas id="trendChart"></canvas>
        </div>
      </div>
    </section>

    <section class="card table-section">
      <h2 class="card-title"><i class="fa-solid fa-list-ul"></i> 最近帳務明細</h2>
      <div class="table-responsive">
        <table class="cute-table">
          <thead>
            <tr>
              <th class="col-date">日期</th>
              <th class="col-account">帳戶</th>
              <th class="col-cat">分類</th>
              <th class="col-sub">細項</th>
              <th class="col-money txt-right">收入</th>
              <th class="col-money txt-right">支出</th>
              <th class="col-money txt-right">餘額</th>
              <th class="col-note">備註</th>
            </tr>
          </thead>
          <tbody id="recordsTbody">
            <tr><td colspan="8" class="empty-msg">資料載入中...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <div id="toast" class="toast">
    <div class="toast-icon">✨</div>
    <div id="toastMsg" class="toast-msg-text">記帳成功！</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
